server:
  port: 8080

spring:
  application:
    name: realtime-chat
  datasource:
    url: jdbc:postgresql://localhost:5432/chatapp
    username: chat
    password: chat
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: latest
      properties:
        spring.json.trusted.packages: com.example.chat.chat.service
        spring.json.value.default.type: com.example.chat.chat.service.ChatMessageEvent
        spring.json.use.type.headers: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    mode: dev
    allow-header-impersonation: true
  websocket:
    endpoint: /ws
    application-prefix: /app
    topic-prefix: /topic
    queue-prefix: /queue
    allowed-origin-patterns:
      - http://localhost:3000
      - http://localhost:5173
      - http://localhost:8080
  realtime:
    max-message-length: 4000
    rate-limit-per-minute: 60
  ai:
    enabled: false
    trigger-prefix: "@ai"
    provider: openai
    openai:
      base-url: https://api.openai.com/v1
      model: gpt-4.1-mini
      api-key: ""
      timeout-seconds: 30
      system-prompt: "You are a concise assistant inside a team chat. Reply with actionable and safe guidance."
  messaging:
    provider: local
    kafka:
      topic: chat.messages
      gateway-group-id: ${spring.application.name}-${random.uuid}
      partitions: 6
    rabbit:
      exchange: chat.messages.exchange
      gateway-queue-prefix: chat.gateway
